# Owner: Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>
# Pre-commit hooks for hyperpolymath RSR repos.
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # --- Standard hooks ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # LICENSES/ holds verbatim licence texts that must match the canonical
      # SPDX wording byte for byte (CC-BY-SA-4.0 and MPL-2.0 both contain
      # significant trailing whitespace). Reformatting them silently
      # invalidates REUSE conformance, so they are excluded here.
      - id: trailing-whitespace
        exclude: '^LICENSES/'
      - id: end-of-file-fixer
        exclude: '^LICENSES/'
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=1024']

  # --- A2ML manifest validation ---
  - repo: https://github.com/hyperpolymath/a2ml-pre-commit
    rev: main
    hooks:
      - id: validate-a2ml
        name: Validate A2ML manifests

  # --- K9 contract validation ---
  - repo: https://github.com/hyperpolymath/k9-pre-commit
    rev: main
    hooks:
      - id: validate-k9
        name: Validate K9 contracts

  # --- Shell linting ---
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # --- EditorConfig ---
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.2.1
    hooks:
      - id: editorconfig-checker
        exclude: '(\.git|node_modules|target|_build|deps|\.deno|external_corpora|\.lake)/'

  # --- Secret detection ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
